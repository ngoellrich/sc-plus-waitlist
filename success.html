    <title>SolarConnect+ | You're on the list</title>

    <link rel="stylesheet" href="styles.css">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            text-align: center;
            gap: 1.5rem;
        }

        .success-page .logo {
            opacity: 1;
            transform: none;
            margin-bottom: 1rem;
        }

        .success-badge {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(244, 186, 62, 0.1);
            color: var(--solar-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(244, 186, 62, 0.25);
            animation: badgePop 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        @keyframes badgePop {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-page h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        .success-page .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 480px;
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
        }

        .back-link {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both;
        }

        .back-link:hover {
            color: var(--solar-primary);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
