            <p id="hero-sub">Limited early access to a small number of companies.</p>

            <ul class="perks-list" id="perks-list">
                <li>Early access to the platform</li>
                <li>Special promotions for founding members</li>
                <li>Sneak peeks to new features</li>

        <section class="form-wrapper">
            <h2 class="form-heading">Get Early Access</h2>
            <div class="form-glass" id="form-container">
                <form id="waitlist-form">
                    <div class="input-group">
                        <input type="text" id="company" name="company" required placeholder=" ">

                    </div>
                    
                    <div class="input-row">
                        <div class="input-group">

                            <label for="first-name">First Name</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="last-name" name="last-name" required placeholder=" ">
                            <label for="last-name">Last Name</label>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <input type="email" id="email" name="email" required placeholder=" ">
                            <label for="email">Work Email</label>
                        </div>
                        <div class="input-group">
                            <input type="tel" id="phone" name="phone" required placeholder=" ">
                            <label for="phone">Phone Number</label>
                        </div>
                    </div>

                    <div class="states-section">
                        <h3>Active States <span class="subtitle">(Select all that apply)</span></h3>
                        <div class="states-grid" id="states-grid">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span>Join the Waitlist</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>

            </div>
            <p class="form-note">You'll get early feature previews and priority access before launch.</p>
